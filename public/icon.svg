<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Background -->
  <rect width="512" height="512" fill="#030712" rx="96"/>
  
  <!-- Glow Filters -->
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <linearGradient id="physics-math" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#fb7185"/>
    </linearGradient>
    <linearGradient id="math-cs" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fb7185"/>
      <stop offset="100%" stop-color="#fcd34d"/>
    </linearGradient>
    <linearGradient id="cs-physics" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
  </defs>

  <!-- Connections (Lines) -->
  <g stroke-linecap="round" opacity="0.8">
    <line x1="256" y1="140" x2="150" y2="330" stroke="url(#physics-math)" stroke-width="8" filter="url(#glow)"/>
    <line x1="150" y1="330" x2="362" y2="330" stroke="url(#math-cs)" stroke-width="8" filter="url(#glow)"/>
    <line x1="362" y1="330" x2="256" y2="140" stroke="url(#cs-physics)" stroke-width="8" filter="url(#glow)"/>
    
    <line x1="256" y1="140" x2="256" y2="266" stroke="#ffffff" stroke-width="4" stroke-dasharray="8 6" opacity="0.6"/>
    <line x1="150" y1="330" x2="256" y2="266" stroke="#ffffff" stroke-width="4" stroke-dasharray="8 6" opacity="0.6"/>
    <line x1="362" y1="330" x2="256" y2="266" stroke="#ffffff" stroke-width="4" stroke-dasharray="8 6" opacity="0.6"/>
  </g>

  <!-- Outer Nodes -->
  <!-- Physics Node (Blue) -->
  <circle cx="256" cy="140" r="32" fill="#60a5fa" filter="url(#glow)" stroke="#ffffff" stroke-width="4"/>
  <circle cx="256" cy="140" r="12" fill="#ffffff"/>
  
  <!-- Math Node (Rose/Red) -->
  <circle cx="150" cy="330" r="32" fill="#fb7185" filter="url(#glow)" stroke="#ffffff" stroke-width="4"/>
  <circle cx="150" cy="330" r="12" fill="#ffffff"/>

  <!-- CS Node (Yellow/Gold) -->
  <circle cx="362" cy="330" r="32" fill="#fcd34d" filter="url(#glow)" stroke="#ffffff" stroke-width="4"/>
  <circle cx="362" cy="330" r="12" fill="#ffffff"/>

  <!-- Central Synapse Core Node (White Glow) -->
  <circle cx="256" cy="266" r="24" fill="#ffffff" filter="url(#glow)" stroke="#e2e8f0" stroke-width="3"/>
  <circle cx="256" cy="266" r="8" fill="#030712"/>
</svg>
